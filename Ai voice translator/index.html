<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Voice Translator</title>
<style>
  :root{
    --bg-deep:#0a0e1f;
    --bg-panel:#11162c;
    --bg-panel-2:#141a35;
    --border-glow:rgba(124,92,255,0.35);
    --violet:#7c5cff;
    --violet-2:#4f7bff;
    --blue:#3b7bff;
    --text-main:#eef0fb;
    --text-dim:#8a90b3;
    --text-faint:#5c6288;
    --pink:#ff4d8d;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 20% 0%, #161d3d 0%, #0a0e1f 45%, #070a17 100%);
    min-height:100vh;
    font-family:'Segoe UI', -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    color:var(--text-main);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .app{
    width:100%;
    max-width:640px;
    background:linear-gradient(180deg, rgba(20,26,53,0.9), rgba(10,14,31,0.9));
    border:1px solid rgba(124,92,255,0.25);
    border-radius:22px;
    padding:26px 26px 30px;
    box-shadow:0 0 0 1px rgba(124,92,255,0.05), 0 30px 80px -20px rgba(60,40,180,0.5);
    position:relative;
    overflow:hidden;
  }
  .app::before{
    content:"";
    position:absolute;
    top:-120px; left:-80px;
    width:320px; height:320px;
    background:radial-gradient(circle, rgba(124,92,255,0.25), transparent 70%);
    pointer-events:none;
  }

  .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-icon{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--violet),var(--blue));
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    box-shadow:0 6px 20px -4px rgba(124,92,255,0.6);
  }
  .brand-icon svg{width:20px;height:20px;}
  .brand-text h1{
    font-size:19px;
    margin:0;
    font-weight:700;
    letter-spacing:0.2px;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:12.5px;
    color:var(--text-dim);
    display:flex;align-items:center;gap:5px;
  }
  .dark-toggle{
    display:flex;align-items:center;gap:6px;
    background:rgba(124,92,255,0.12);
    border:1px solid rgba(124,92,255,0.25);
    color:var(--text-dim);
    font-size:12px;
    padding:7px 12px;
    border-radius:20px;
    cursor:pointer;
    user-select:none;
  }
  .dark-toggle:hover{color:var(--text-main);}

  .lang-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:18px;
  }
  .lang-field{
    flex:1;
    background:var(--bg-panel);
    border:1px solid rgba(124,92,255,0.18);
    border-radius:14px;
    padding:10px 12px;
  }
  .lang-label{
    font-size:10.5px;
    letter-spacing:1px;
    color:var(--text-faint);
    font-weight:600;
    margin-bottom:6px;
  }
  .lang-select-wrap{
    display:flex;align-items:center;gap:8px;
    position:relative;
  }
  .flag{font-size:18px;}
  select.lang-select{
    appearance:none;
    background:transparent;
    border:none;
    color:var(--text-main);
    font-size:14.5px;
    font-weight:600;
    flex:1;
    cursor:pointer;
    outline:none;
  }
  select.lang-select option{background:#141a35;color:var(--text-main);}
  .chevron{color:var(--text-dim);font-size:11px;}

  .swap-btn{
    width:38px;height:38px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--violet-2));
    border:none;
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    box-shadow:0 6px 16px -4px rgba(124,92,255,0.7);
    transition:transform .25s ease;
  }
  .swap-btn:hover{transform:rotate(180deg);}
  .swap-btn svg{width:16px;height:16px;}

  .panels{
    display:grid;
    grid-template-columns:1fr 38px 1fr;
    gap:10px;
    align-items:stretch;
    margin-bottom:20px;
  }
  @media (max-width:520px){
    .panels{grid-template-columns:1fr; }
    .mid-arrow{display:none;}
  }

  .panel{
    background:var(--bg-panel);
    border:1px solid rgba(124,92,255,0.18);
    border-radius:16px;
    padding:18px;
    display:flex;
    flex-direction:column;
    min-height:210px;
  }
  .panel.source{align-items:center; justify-content:center; text-align:center;}
  .panel.target{border-color:rgba(124,92,255,0.35);}

  .mic-btn{
    width:78px;height:78px;
    border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--violet-2));
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    margin-bottom:14px;
    box-shadow:0 0 0 6px rgba(124,92,255,0.12), 0 10px 30px -6px rgba(124,92,255,0.7);
    position:relative;
    transition:transform .15s ease, box-shadow .3s ease;
  }
  .mic-btn svg{width:28px;height:28px;color:#fff;}
  .mic-btn.recording{
    animation:pulse 1.4s ease-in-out infinite;
    background:linear-gradient(135deg,var(--pink),var(--violet));
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 6px rgba(124,92,255,0.12), 0 10px 30px -6px rgba(124,92,255,0.7);}
    50%{box-shadow:0 0 0 14px rgba(124,92,255,0.06), 0 10px 30px -6px rgba(124,92,255,0.9);}
    100%{box-shadow:0 0 0 6px rgba(124,92,255,0.12), 0 10px 30px -6px rgba(124,92,255,0.7);}
  }
  .mic-hint{
    font-size:13px;
    color:var(--text-dim);
    margin-bottom:14px;
  }
  .waveform{
    display:flex;
    align-items:center;
    gap:2px;
    height:20px;
    margin-bottom:10px;
  }
  .waveform span{
    width:3px;
    border-radius:2px;
    background:linear-gradient(180deg,var(--violet),var(--violet-2));
    opacity:0.35;
    transition:height .1s ease, opacity .2s ease;
  }
  .time-row{
    display:flex;
    justify-content:space-between;
    width:100%;
    font-size:11px;
    color:var(--text-faint);
  }
  .manual-input{
    width:100%;
    margin-top:12px;
    background:rgba(124,92,255,0.06);
    border:1px solid rgba(124,92,255,0.18);
    border-radius:10px;
    color:var(--text-main);
    font-size:13px;
    font-family:inherit;
    padding:8px 10px;
    resize:none;
    min-height:44px;
    outline:none;
  }
  .manual-input:focus{border-color:rgba(124,92,255,0.5);}
  .manual-input::placeholder{color:var(--text-faint);}
  .error-text{color:#ff6b8a !important;}

  .panel-label{
    font-size:10.5px;
    letter-spacing:1px;
    color:var(--violet-2);
    font-weight:700;
    margin-bottom:10px;
  }
  .translation-text{
    font-size:17px;
    font-weight:600;
    color:var(--text-main);
    line-height:1.4;
    margin-bottom:6px;
    min-height:46px;
  }
  .translation-sub{
    font-size:12.5px;
    color:var(--text-faint);
    flex:1;
    margin-bottom:12px;
  }
  .target-actions{
    display:flex;
    gap:8px;
    margin-top:auto;
  }
  .icon-btn{
    width:34px;height:34px;
    border-radius:10px;
    background:rgba(124,92,255,0.1);
    border:1px solid rgba(124,92,255,0.2);
    color:var(--text-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .icon-btn:hover{color:var(--text-main); background:rgba(124,92,255,0.18);}
  .icon-btn svg{width:15px;height:15px;}
  .icon-btn.liked{color:var(--pink); border-color:rgba(255,77,141,0.4);}

  .mid-arrow{
    display:flex;align-items:center;justify-content:center;
  }
  .mid-arrow .circle{
    width:34px;height:34px;
    border-radius:50%;
    background:var(--bg-panel-2);
    border:1px solid rgba(124,92,255,0.25);
    display:flex;align-items:center;justify-content:center;
    color:var(--violet-2);
  }
  .mid-arrow svg{width:14px;height:14px;}

  .translate-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,var(--violet),var(--blue));
    color:#fff;
    font-size:15px;
    font-weight:700;
    letter-spacing:0.3px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 10px 30px -8px rgba(80,110,255,0.6);
    transition:filter .2s ease, transform .15s ease;
  }
  .translate-btn:hover{filter:brightness(1.08);}
  .translate-btn:active{transform:scale(0.99);}
  .translate-btn svg{width:16px;height:16px;}
  .translate-btn:disabled{opacity:0.6; cursor:not-allowed;}

  .status-note{
    text-align:center;
    font-size:11.5px;
    color:var(--text-faint);
    margin-top:12px;
  }
</style>
</head>
<body>

<div class="app">
  <div class="top-row">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" fill="white"/>
          <path d="M5 10v1a7 7 0 0 0 14 0v-1" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M12 18v3" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="brand-text">
        <h1>AI Voice Translator</h1>
        <p>Speak, translate and connect with the world 🌐</p>
      </div>
    </div>
    <div class="dark-toggle" id="themeToggle">🌙 Dark Mode</div>
  </div>

  <div class="lang-row">
    <div class="lang-field">
      <div class="lang-label">FROM</div>
      <div class="lang-select-wrap">
        <span class="flag">🇺🇸</span>
        <select class="lang-select" id="fromLang">
          <option value="en" data-flag="🇺🇸">English</option>
          <option value="ur" data-flag="🇵🇰">Urdu</option>
          <option value="es" data-flag="🇪🇸">Spanish</option>
          <option value="fr" data-flag="🇫🇷">French</option>
          <option value="de" data-flag="🇩🇪">German</option>
          <option value="ar" data-flag="🇸🇦">Arabic</option>
          <option value="hi" data-flag="🇮🇳">Hindi</option>
          <option value="zh" data-flag="🇨🇳">Chinese</option>
        </select>
        <span class="chevron">▾</span>
      </div>
    </div>

    <button class="swap-btn" id="swapBtn" title="Swap languages">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 7h11l-3-3M17 17H6l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="lang-field">
      <div class="lang-label">TO</div>
      <div class="lang-select-wrap">
        <span class="flag" id="toFlag">🇪🇸</span>
        <select class="lang-select" id="toLang">
          <option value="es" data-flag="🇪🇸">Spanish</option>
          <option value="en" data-flag="🇺🇸">English</option>
          <option value="ur" data-flag="🇵🇰">Urdu</option>
          <option value="fr" data-flag="🇫🇷">French</option>
          <option value="de" data-flag="🇩🇪">German</option>
          <option value="ar" data-flag="🇸🇦">Arabic</option>
          <option value="hi" data-flag="🇮🇳">Hindi</option>
          <option value="zh" data-flag="🇨🇳">Chinese</option>
        </select>
        <span class="chevron">▾</span>
      </div>
    </div>
  </div>

  <div class="panels">
    <div class="panel source">
      <button class="mic-btn" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" fill="currentColor"/>
          <path d="M6 11a6 6 0 0 0 12 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 17v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="mic-hint" id="micHint">Tap the microphone and start speaking</div>
      <div class="waveform" id="waveform"></div>
      <div class="time-row">
        <span id="timeElapsed">00:00</span>
        <span id="charCount">0 / 500</span>
      </div>
      <textarea class="manual-input" id="manualInput" maxlength="500" placeholder="Ya yahan type karein agar mic kaam na kare..."></textarea>
    </div>

    <div class="mid-arrow">
      <div class="circle">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>

    <div class="panel target">
      <div class="panel-label">TRANSLATION</div>
      <div class="translation-text" id="translationText">Your translation will appear here</div>
      <div class="translation-sub" id="translationSub"></div>
      <div class="target-actions">
        <button class="icon-btn" id="speakBtn" title="Listen">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 9v6h4l5 4V5L9 9H5Z" fill="currentColor"/><path d="M17 8a5 5 0 0 1 0 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="copyBtn" title="Copy">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M5 15V5a2 2 0 0 1 2-2h10" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button class="icon-btn" id="likeBtn" title="Save">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 21s-7-4.5-9.5-9C1 8.5 2.5 5 6 5c2 0 3.5 1.2 4 2.2C10.5 6.2 12 5 14 5c3.5 0 5 3.5 3.5 7-2.5 4.5-9.5 9-9.5 9Z" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <button class="translate-btn" id="translateBtn">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h9M4 12h6M4 18h13M17 15l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Translate
  </button>
  <div class="status-note" id="statusNote">Uses your browser's speech recognition &amp; a free translation API</div>
</div>

<script>
  const micBtn = document.getElementById('micBtn');
  const micHint = document.getElementById('micHint');
  const waveform = document.getElementById('waveform');
  const timeElapsed = document.getElementById('timeElapsed');
  const charCount = document.getElementById('charCount');
  const translationText = document.getElementById('translationText');
  const translationSub = document.getElementById('translationSub');
  const translateBtn = document.getElementById('translateBtn');
  const fromLang = document.getElementById('fromLang');
  const toLang = document.getElementById('toLang');
  const swapBtn = document.getElementById('swapBtn');
  const speakBtn = document.getElementById('speakBtn');
  const copyBtn = document.getElementById('copyBtn');
  const likeBtn = document.getElementById('likeBtn');
  const statusNote = document.getElementById('statusNote');
  const themeToggle = document.getElementById('themeToggle');

  // build waveform bars
  const BAR_COUNT = 40;
  for(let i=0;i<BAR_COUNT;i++){
    const bar = document.createElement('span');
    bar.style.height = '4px';
    waveform.appendChild(bar);
  }
  const bars = waveform.querySelectorAll('span');

  const manualInput = document.getElementById('manualInput');

  let recognizedText = "";
  let recognizing = false;
  let recognition = null;
  let timerInterval = null;
  let waveInterval = null;
  let seconds = 0;

  manualInput.addEventListener('input', ()=>{
    recognizedText = manualInput.value;
    charCount.textContent = recognizedText.length + " / 500";
  });

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(SpeechRecognition){
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
  } else {
    statusNote.textContent = "Speech recognition isn't supported in this browser — try Chrome, or type isn't available here.";
  }

  function langCode(select){ return select.value; }

  function updateMicLangs(){
    if(recognition){
      const map = {en:'en-US', ur:'ur-PK', es:'es-ES', fr:'fr-FR', de:'de-DE', ar:'ar-SA', hi:'hi-IN', zh:'zh-CN'};
      recognition.lang = map[langCode(fromLang)] || 'en-US';
    }
  }
  updateMicLangs();
  fromLang.addEventListener('change', updateMicLangs);

  function formatTime(s){
    const m = Math.floor(s/60).toString().padStart(2,'0');
    const sec = (s%60).toString().padStart(2,'0');
    return m+':'+sec;
  }

  function startWave(){
    waveInterval = setInterval(()=>{
      bars.forEach(b=>{
        const h = 4 + Math.random()*16;
        b.style.height = h+'px';
        b.style.opacity = 0.4 + Math.random()*0.6;
      });
    }, 120);
  }
  function stopWave(){
    clearInterval(waveInterval);
    bars.forEach(b=>{ b.style.height='4px'; b.style.opacity=0.35; });
  }

  function startTimer(){
    seconds = 0;
    timeElapsed.textContent = formatTime(seconds);
    timerInterval = setInterval(()=>{
      seconds++;
      timeElapsed.textContent = formatTime(seconds);
    },1000);
  }
  function stopTimer(){ clearInterval(timerInterval); }

  micBtn.addEventListener('click', ()=>{
    if(!recognition){
      alert("Speech recognition isn't supported in this browser. Try Chrome on desktop or Android.");
      return;
    }
    if(!recognizing){
      recognizedText = "";
      charCount.textContent = "0 / 500";
      micHint.textContent = "Listening...";
      micBtn.classList.add('recording');
      startWave();
      startTimer();
      try{ recognition.start(); }catch(e){}
      recognizing = true;
    } else {
      recognition.stop();
    }
  });

  if(recognition){
    recognition.onresult = (event)=>{
      let interim = "";
      let final = "";
      for(let i=event.resultIndex;i<event.results.length;i++){
        const transcript = event.results[i][0].transcript;
        if(event.results[i].isFinal){ final += transcript; }
        else { interim += transcript; }
      }
      if(final) recognizedText += final;
      const shown = (recognizedText + " " + interim).trim().slice(0,500);
      micHint.textContent = shown || "Listening...";
      charCount.textContent = shown.length + " / 500";
      manualInput.value = recognizedText.trim().slice(0,500);
    };
    recognition.onerror = (e)=>{
      micHint.textContent = "Tap the microphone and start speaking";
      recognizing = false;
      micBtn.classList.remove('recording');
      stopWave();
      stopTimer();
      let msg = "Mic error: " + e.error;
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        msg = "Mic permission blocked (common in embedded previews). Type your text in the box below instead.";
      } else if(e.error === 'no-speech'){
        msg = "Didn't catch any speech — try again, or type below.";
      }
      statusNote.textContent = msg;
      statusNote.classList.add('error-text');
    };
    recognition.onend = ()=>{
      recognizing = false;
      micBtn.classList.remove('recording');
      stopWave();
      stopTimer();
      if(!recognizedText.trim()){
        micHint.textContent = "Tap the microphone and start speaking";
      } else {
        micHint.textContent = recognizedText.trim().slice(0,500);
        manualInput.value = recognizedText.trim().slice(0,500);
      }
    };
  }

  async function tryGoogleTranslate(text, source, target){
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${source}&tl=${target}&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('google failed');
    const data = await res.json();
    const translated = data[0].map(chunk => chunk[0]).join('');
    if(!translated) throw new Error('empty result');
    return translated;
  }

  async function tryMyMemory(text, source, target){
    const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${source}|${target}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('mymemory failed');
    const data = await res.json();
    const translated = data && data.responseData ? data.responseData.translatedText : "";
    if(!translated) throw new Error('empty result');
    return translated;
  }

  async function translateText(text, source, target){
    if(!text.trim()) return { translated:"", ok:false };
    try{
      const translated = await tryGoogleTranslate(text, source, target);
      return { translated, ok:true };
    }catch(err1){
      try{
        const translated = await tryMyMemory(text, source, target);
        return { translated, ok:true };
      }catch(err2){
        return { translated:"Couldn't reach a translation service right now — check your internet connection and try again.", ok:false };
      }
    }
  }

  translateBtn.addEventListener('click', async ()=>{
    const text = (manualInput.value || recognizedText).trim();
    if(!text){
      translationText.textContent = "Type or speak something first.";
      translationText.classList.add('error-text');
      translationSub.textContent = "";
      return;
    }
    translationText.classList.remove('error-text');
    translateBtn.disabled = true;
    translateBtn.textContent = "Translating…";
    statusNote.classList.remove('error-text');
    statusNote.textContent = "Uses your browser's speech recognition & a free translation API";

    const result = await translateText(text, langCode(fromLang), langCode(toLang));

    translationText.textContent = result.translated;
    if(!result.ok) translationText.classList.add('error-text');
    translationSub.textContent = result.ok ? "(" + text + ")" : "";
    translateBtn.disabled = false;
    translateBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h9M4 12h6M4 18h13M17 15l3 3-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Translate';
  });

  swapBtn.addEventListener('click', ()=>{
    const f = fromLang.value, t = toLang.value;
    fromLang.value = t; toLang.value = f;
    updateMicLangs();
  });

  speakBtn.addEventListener('click', ()=>{
    const text = translationText.textContent.trim();
    if(!text || text === "Your translation will appear here") return;
    const utter = new SpeechSynthesisUtterance(text);
    const map = {en:'en-US', ur:'ur-PK', es:'es-ES', fr:'fr-FR', de:'de-DE', ar:'ar-SA', hi:'hi-IN', zh:'zh-CN'};
    utter.lang = map[langCode(toLang)] || 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  });

  copyBtn.addEventListener('click', async ()=>{
    const text = translationText.textContent.trim();
    if(!text || text === "Your translation will appear here") return;
    try{
      await navigator.clipboard.writeText(text);
      copyBtn.style.color = '#7c5cff';
      setTimeout(()=>{ copyBtn.style.color=''; }, 900);
    }catch(e){}
  });

  likeBtn.addEventListener('click', ()=>{
    likeBtn.classList.toggle('liked');
  });

  let isDark = true;
  themeToggle.addEventListener('click', ()=>{
    isDark = !isDark;
    if(isDark){
      document.body.style.background = 'radial-gradient(circle at 20% 0%, #161d3d 0%, #0a0e1f 45%, #070a17 100%)';
      themeToggle.textContent = '🌙 Dark Mode';
    } else {
      document.body.style.background = 'radial-gradient(circle at 20% 0%, #eef0fb 0%, #dfe3f5 45%, #cfd4ee 100%)';
      themeToggle.textContent = '☀️ Light Mode';
    }
  });
</script>

</body>
</html>
